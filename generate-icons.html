<!DOCTYPE html>
<html><head><title>Generar íconos</title></head>
<body style="background:#222;color:#fff;font-family:system-ui;padding:20px">
<h2>Haz clic derecho en cada imagen → "Guardar imagen como..."</h2>
<p>Guárdalas como <code>icon-192.png</code> y <code>icon-512.png</code> en la misma carpeta de la app.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #444;margin:10px"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #444;margin:10px"></canvas>
<script>
function drawIcon(canvas) {
    const s = canvas.width;
    const ctx = canvas.getContext('2d');
    const r = s * 0.2;

    // Rounded rect background
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(s - r, 0);
    ctx.quadraticCurveTo(s, 0, s, r);
    ctx.lineTo(s, s - r);
    ctx.quadraticCurveTo(s, s, s - r, s);
    ctx.lineTo(r, s);
    ctx.quadraticCurveTo(0, s, 0, s - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.fillStyle = '#0a0a0a';
    ctx.fill();

    const cx = s / 2, cy = s * 0.52, radius = s * 0.29;

    // Circle bg
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.strokeStyle = '#1a2a3d';
    ctx.lineWidth = s * 0.04;
    ctx.stroke();

    // Progress arc
    ctx.beginPath();
    ctx.arc(cx, cy, radius, -Math.PI / 2, -Math.PI / 2 + Math.PI * 0.5);
    ctx.strokeStyle = '#4A90D9';
    ctx.lineWidth = s * 0.04;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Text
    ctx.fillStyle = '#f0f0f0';
    ctx.font = `300 ${s * 0.15}px system-ui`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('25', cx, cy);
}
drawIcon(document.getElementById('c192'));
drawIcon(document.getElementById('c512'));
</script>
</body></html>
